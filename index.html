<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clinic Streak</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #14110d;
    --paper: #f4f0e6;
    --panel: #fbf8f0;
    --line: #d8d0bd;
    --line-soft: #e7e0cf;
    --accent: #b4451f;
    --accent-soft: #f0d9cb;
    --rep: #2a2620;
    --clinic: #5a4a2f;
    --drug: #8a7a55;
    --pos: #355e3b;
    --muted: #8c8472;
    --shadow: 0 1px 0 rgba(20,17,13,.04), 0 8px 28px -18px rgba(20,17,13,.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 120% at 100% 0%, #fbf8ef 0%, var(--paper) 55%),
      var(--paper);
    color: var(--ink);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1500px; margin: 0 auto; padding: 28px 26px 80px; }

  header.top { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; border-bottom: 2px solid var(--ink); padding-bottom: 14px; }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600; font-size: 38px; line-height: .95; margin: 0;
    letter-spacing: -.01em;
  }
  .brand .sub { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
  .meta { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); text-align: right; line-height: 1.6; }
  .meta b { color: var(--ink); font-weight: 600; }

  .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(205px, 1fr)); gap: 12px; margin: 22px 0 18px; }

  .filter {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 13px 13px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; min-height: 0; min-width: 0;
  }
  .filter .lbl { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .filter .lbl .name { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .filter .lbl .count { font-family: "IBM Plex Mono", monospace; font-size: 10.5px; color: var(--muted); white-space: nowrap; }
  .filter input.search {
    width: 100%; border: 1px solid var(--line); background: #fff;
    border-radius: 7px; padding: 7px 9px; font: inherit; font-size: 12.5px;
    margin-bottom: 8px; outline: none; box-sizing: border-box;
  }
  .filter input.search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .optbox { overflow-y: auto; overflow-x: hidden; max-height: 168px; border-top: 1px dashed var(--line-soft); padding-top: 7px; min-width: 0; }
  .opt { display: flex; align-items: center; gap: 8px; padding: 3px 4px; border-radius: 6px; cursor: pointer; font-size: 12.5px; min-width: 0; }
  .opt:hover { background: var(--accent-soft); }
  .opt input { accent-color: var(--accent); width: 14px; height: 14px; flex: none; }
  .opt .t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .filter .actions { display: flex; gap: 10px; margin-top: 8px; }
  .filter .actions button {
    font-family: "IBM Plex Mono", monospace; font-size: 10.5px; letter-spacing: .08em;
    text-transform: uppercase; background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 2px 0; border-bottom: 1px solid transparent;
  }
  .filter .actions button:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .toolbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
  .toolbar .btn {
    font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .06em;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 12px; cursor: pointer; color: var(--ink);
  }
  .toolbar .btn:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar .spacer { flex: 1; }
  .toolbar .summary { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; color: var(--muted); }
  .toolbar .summary b { color: var(--ink); }

  /* Pie/donut charts */
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 12px; margin: 0 0 20px; }
  .chart-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 14px 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; }
  .chart-card .ttl { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .chart-card .cap { font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .chart-card .pie { display: block; width: 130px; height: 130px; margin: 12px auto 10px; }
  .legend { display: flex; flex-direction: column; gap: 3px; }
  .legend .lg { display: flex; align-items: center; gap: 7px; font-size: 11.5px; line-height: 1.3; }
  .legend .sw { width: 10px; height: 10px; border-radius: 2px; flex: none; }
  .legend .lb { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend .vl { font-family: "IBM Plex Mono", monospace; font-size: 10.5px; color: var(--muted); flex: none; }

  .tablewrap { border: 1px solid var(--line); border-radius: 12px; overflow: auto; background: var(--panel); box-shadow: var(--shadow); max-height: calc(100vh - 120px); }
  table { border-collapse: separate; border-spacing: 0; width: 100%; font-variant-numeric: tabular-nums; }
  thead th {
    position: sticky; top: 0; z-index: 3; background: var(--ink); color: var(--paper);
    font-family: "IBM Plex Mono", monospace; font-weight: 500; font-size: 11px;
    padding: 9px 8px; text-align: right; white-space: nowrap; letter-spacing: .03em;
  }
  thead th.rowhead { text-align: left; left: 0; z-index: 4; min-width: 320px; }
  thead th.gt { color: #ffd9b0; border-left: 2px solid var(--accent); }
  thead th.mcol.clk { cursor: pointer; }
  thead th.mcol .cwirl { display: inline-flex; width: 11px; justify-content: center; margin-right: 4px; color: #ffd9b0; font-size: 9px; transition: transform .12s; }
  thead th.mcol .cwirl.closed { transform: rotate(-90deg); }
  thead th.mcol.exp { border-left: 1px solid var(--accent); }
  thead th.wk { background: #3a342b; color: #e8dcc2; font-weight: 400; font-size: 10px; letter-spacing: .02em; }
  tbody td.wk { background: #fbf8ef; color: var(--drug); font-size: 11.5px; }

  tbody td { padding: 5px 8px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line-soft); font-size: 12.5px; }
  tbody td.rowhead {
    position: sticky; left: 0; z-index: 2; text-align: left;
    background: var(--panel); border-right: 1px solid var(--line);
    max-width: 360px;
  }
  tbody td.gt { font-weight: 600; border-left: 2px solid var(--line); }
  td .z { color: #cfc7b3; }

  .r-rep   td { background: #efe9da; }
  .r-rep   td.rowhead { background: #efe9da; }
  .r-clinic td.rowhead { padding-left: 26px; }
  .r-drug   td.rowhead { padding-left: 48px; color: var(--drug); }
  .r-clinic td.rowhead { color: var(--clinic); }
  .r-rep    td.rowhead { color: var(--rep); }

  .twirl { display: inline-flex; width: 15px; justify-content: center; margin-right: 6px; cursor: pointer; color: var(--accent); font-size: 10px; user-select: none; transition: transform .12s; }
  .twirl.closed { transform: rotate(-90deg); }
  .twirl.leaf { color: var(--line); cursor: default; }
  .rowname { font-weight: 500; }
  .r-rep .rowname { font-family: "Fraunces", serif; font-weight: 600; font-size: 14.5px; }
  .r-drug .rowname { font-weight: 400; }
  .pos { color: var(--pos); }
  .grand-row td { background: var(--ink); color: var(--paper); font-weight: 600; position: sticky; bottom: 0; z-index: 3; }
  .grand-row td.rowhead { background: var(--ink); color: var(--paper); z-index: 4; }

  .loading, .empty { padding: 60px; text-align: center; font-family: "IBM Plex Mono", monospace; color: var(--muted); }
  .chip { display:inline-block; font-family:"IBM Plex Mono",monospace; font-size:10.5px; background:var(--accent-soft); color:var(--accent); border-radius:20px; padding:2px 9px; margin-left:6px;}

  /* Drop zone */
  .drop {
    margin: 20px 0 4px; border: 2px dashed var(--line); border-radius: 12px;
    background: var(--panel); padding: 18px 20px; display: flex; align-items: center;
    gap: 16px; transition: border-color .15s, background .15s; cursor: pointer;
  }
  .drop:hover { border-color: var(--accent); }
  .drop.dragover { border-color: var(--accent); background: var(--accent-soft); }
  .drop .icon { font-size: 26px; line-height: 1; color: var(--accent); }
  .drop .txt { flex: 1; }
  .drop .txt .h { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: .04em; color: var(--ink); }
  .drop .txt .s { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .drop .pick {
    font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: .06em;
    background: var(--ink); color: var(--paper); border: none; border-radius: 8px;
    padding: 9px 14px; cursor: pointer;
  }
  .drop .pick:hover { background: var(--accent); }
  .drop.ok { border-style: solid; border-color: var(--pos); }
  .drop.ok .icon { color: var(--pos); }
  .drop.err { border-style: solid; border-color: var(--accent); }
  .drop input[type=file] { display: none; }
  /* login gate */
  #login-gate{position:fixed;inset:0;display:grid;place-items:center;padding:24px;z-index:50;
    background:radial-gradient(120% 120% at 100% 0%, #fbf8ef 0%, var(--paper) 55%), var(--paper);}
  .login-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:30px 28px;box-shadow:var(--shadow);}
  .login-logo{width:42px;height:42px;border-radius:11px;background:var(--accent);display:grid;place-items:center;
    font-family:"Fraunces",serif;font-weight:600;font-size:18px;color:#fff;margin-bottom:14px;}
  .login-card h1{font-family:"Fraunces",serif;font-weight:600;font-size:24px;margin:0 0 4px;color:var(--ink);}
  .login-card p{color:var(--muted);font-size:13px;margin:0 0 22px;}
  .login-card label{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px;}
  .login-card input{width:100%;box-sizing:border-box;background:#fff;border:1px solid var(--line);border-radius:9px;
    padding:11px 13px;color:var(--ink);font-family:"IBM Plex Sans",sans-serif;font-size:14px;margin-bottom:14px;}
  .login-card input:focus{outline:none;border-color:var(--accent);}
  .login-card button{width:100%;border:none;border-radius:9px;padding:12px;cursor:pointer;font-weight:600;font-size:14px;
    color:#fff;background:var(--accent);font-family:"IBM Plex Sans",sans-serif;}
  .login-card button:disabled{opacity:.6;cursor:default;}
  .login-err{color:var(--accent);font-size:12.5px;margin-top:12px;min-height:16px;}
  .signout{font-family:"IBM Plex Sans",sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 11px;}
  .signout:hover{color:var(--ink);}
</style>
</head>
<body>
<div id="login-gate">
  <div class="login-card">
    <div class="login-logo">CS</div>
    <h1>Clinic&nbsp;Streak</h1>
    <p>Sign in to view the report.</p>
    <label for="lg-email">Email</label>
    <input id="lg-email" type="email" autocomplete="username" placeholder="you@company.com" />
    <label for="lg-pw">Password</label>
    <input id="lg-pw" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button id="lg-btn">Sign in</button>
    <div class="login-err" id="lg-err"></div>
  </div>
</div>
<div class="wrap" id="app" style="display:none">
  <header class="top">
    <div class="brand">
      <h1>Clinic&nbsp;Streak</h1>
      <span class="sub">Monthly order subtotals · Rep ▸ Clinic ▸ Drug</span>
    </div>
    <div class="meta" id="meta">loading…</div>
  </header>

  <label class="drop" id="drop">
    <span class="icon">⬇</span>
    <span class="txt">
      <span class="h" id="dropHead">Drop a Metabase .xlsx export here</span>
      <span class="s" id="dropSub">…or click to browse. Runs entirely in your browser — no internet, no upload, no install.</span>
    </span>
    <span class="pick">Choose file</span>
    <input type="file" id="fileInput" accept=".xlsx,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
  </label>

  <section class="controls" id="controls"></section>

  <section class="charts" id="charts"></section>

  <div class="toolbar">
    <button class="btn" id="expandAll">▸ Expand all</button>
    <button class="btn" id="collapseAll">▾ Collapse to reps</button>
    <button class="btn" id="toggleWeeks">▦ Expand months → weeks</button>
    <button class="btn" id="resetFilters">↺ Reset filters</button>
    <button class="btn" id="exportDrug" title="Download the current (filtered) pivot as CSV — one row per drug">⬇ Export by drug (CSV)</button>
    <button class="btn" id="exportClinic" title="Download the current (filtered) pivot as CSV — one row per clinic (drugs combined)">⬇ Export by clinic (CSV)</button>
    <button class="btn" id="exportWorkbook" title="Download a formatted Excel sheet — one row per clinic with a MoM Category column (New, Up/Down %, and 1/2/3+ months inactive)">⬇ Export MoM by clinic (Excel)</button>
    <button class="btn" id="downloadCopy" title="Save a self-contained HTML file with the data currently loaded baked in">⬇ Download shareable copy</button>
    <div class="spacer"></div>
    <div class="summary" id="summary"></div>
  </div>

  <div class="tablewrap">
    <div class="loading" id="loading">Loading data…</div>
    <table id="table" hidden></table>
  </div>
</div>

<script>
/* pivot.js — aggregation engine for the Clinic Streak dashboard.
 *
 * Builds the Metabase-style pivot: rows grouped Rep > Clinic > Drug, columns =
 * order months, values = sum of subtotal. Each record carries a `period`
 * (a month ordinal = year*12 + monthIndex) assigned by the reader; this module
 * filters, aggregates into month columns, and sorts by recency.
 */

(function (global) {
  "use strict";

  function unique(records, key) {
    const set = new Set();
    for (const r of records) set.add(r[key]);
    return Array.from(set).sort((a, b) =>
      String(a).localeCompare(String(b))
    );
  }

  // filters: { reps:Set|null, clinics:Set|null, drugs:Set|null }
  // null/empty set => no constraint on that dimension.
  function applyFilters(records, filters) {
    const f = filters || {};
    const has = (s) => s && s.size > 0;
    return records.filter((r) => {
      if (has(f.reps) && !f.reps.has(r.rep)) return false;
      if (has(f.clinics) && !f.clinics.has(r.clinic)) return false;
      if (has(f.drugs) && !f.drugs.has(r.drug)) return false;
      if (has(f.recency) && !f.recency.has(r.recency)) return false;
      if (has(f.mom) && !f.mom.has(r.mom)) return false;
      return true;
    });
  }

  // Build the nested pivot: Rep -> Clinic -> Drug, each holding monthly sums
  // (cols) and, alongside, weekly sums per month (wcols) so a month column can
  // be expanded into its weeks. Weeks are real Monday–Sunday calendar weeks,
  // keyed by the ordinal day-number of their Monday (`wkstart`); a week that
  // straddles a month boundary contributes to each month only the orders dated
  // in that month, so a month's total always equals the sum of its week cells.
  // range: {min, max} inclusive month ordinals.
  function buildPivot(records, range) {
    const min = range.min;
    const max = range.max;
    const nCols = max - min + 1;
    const blank = () => new Array(nCols).fill(0);

    const reps = new Map(); // repName -> repNode
    const weeksSeen = Array.from({ length: nCols }, () => new Set());

    function ensure(map, name, makeNode) {
      let node = map.get(name);
      if (!node) {
        node = makeNode();
        map.set(name, node);
      }
      return node;
    }

    // node.wcols[col] is an object map { wkstart -> sum } for that month.
    function addWeek(node, col, wk, v) {
      if (!node.wcols[col]) node.wcols[col] = {};
      node.wcols[col][wk] = (node.wcols[col][wk] || 0) + v;
    }

    for (const rec of records) {
      const col = rec.period - min;
      if (col < 0 || col >= nCols) continue;
      const wk = rec.wkstart | 0; // Monday ordinal of this order's week

      const rep = ensure(reps, rec.rep, () => ({
        name: rec.rep,
        cols: blank(),
        wcols: new Array(nCols),
        total: 0,
        clinics: new Map(),
      }));
      const clinic = ensure(rep.clinics, rec.clinic, () => ({
        name: rec.clinic,
        cols: blank(),
        wcols: new Array(nCols),
        total: 0,
        drugs: new Map(),
      }));
      const drug = ensure(clinic.drugs, rec.drug, () => ({
        name: rec.drug,
        cols: blank(),
        wcols: new Array(nCols),
        total: 0,
      }));

      const v = rec.subtotal || 0;
      rep.cols[col] += v; rep.total += v; addWeek(rep, col, wk, v);
      clinic.cols[col] += v; clinic.total += v; addWeek(clinic, col, wk, v);
      drug.cols[col] += v; drug.total += v; addWeek(drug, col, wk, v);
      if (v) weeksSeen[col].add(wk);
    }

    // Grand totals per month + weekly + overall.
    const grandCols = blank();
    const grandWcols = new Array(nCols);
    let grandTotal = 0;
    for (const rep of reps.values()) {
      for (let i = 0; i < nCols; i++) {
        grandCols[i] += rep.cols[i];
        if (rep.wcols[i]) {
          if (!grandWcols[i]) grandWcols[i] = {};
          for (const wk in rep.wcols[i])
            grandWcols[i][wk] = (grandWcols[i][wk] || 0) + rep.wcols[i][wk];
        }
      }
      grandTotal += rep.total;
    }

    // Which week-starts actually have data in each month (so expanding a month
    // shows only real weeks), sorted chronologically.
    const weeksPresent = weeksSeen.map((s) =>
      Array.from(s).sort((a, b) => a - b));

    // Sort by monthly subtotal, comparing the latest month first and walking
    // back toward the first month. Higher subtotal in a more recent month
    // ranks higher, so rows whose most recent order is more recent float to the
    // top (i.e. fewer months since their last order). Tie-break: name.
    const byRecent = (a, b) => {
      for (let i = nCols - 1; i >= 0; i--) {
        const av = a.cols[i], bv = b.cols[i];
        if (av !== bv) return bv - av; // descending
      }
      return a.name.localeCompare(b.name);
    };

    const repList = Array.from(reps.values()).sort(byRecent);
    for (const rep of repList) {
      rep.clinics = Array.from(rep.clinics.values()).sort(byRecent);
      for (const clinic of rep.clinics) {
        clinic.drugs = Array.from(clinic.drugs.values()).sort(byRecent);
      }
    }

    return {
      min,
      max,
      nCols,
      reps: repList,
      grandCols,
      grandWcols,
      weeksPresent,
      grandTotal,
    };
  }

  global.Pivot = { unique, applyFilters, buildPivot, tagRecency, recencyLabel,
                   mondayOrdinal, weekRangeLabel, normalizeWeeks, tagMomChange };

  // ── Weeks ──────────────────────────────────────────────────────────────
  // Orders are grouped into real Monday–Sunday calendar weeks (matching the
  // Metabase "Order Week" field). A week is identified by `wkstart`, the
  // ordinal day-number (days since 1970-01-01, UTC) of its Monday.
  function mondayOrdinal(iso) {
    const y = +iso.slice(0, 4), m = +iso.slice(5, 7), d = +iso.slice(8, 10);
    const t = Date.UTC(y, m - 1, d);
    const dow = new Date(t).getUTCDay();       // 0=Sun … 6=Sat
    const offset = (dow === 0 ? 6 : dow - 1);  // days back to Monday
    return Math.floor(t / 86400000) - offset;
  }

  // Format a wkstart ordinal as its Monday–Sunday date range, e.g. "5/25–5/31".
  function weekRangeLabel(wkstart) {
    const mon = new Date(wkstart * 86400000);
    const sun = new Date((wkstart + 6) * 86400000);
    return (mon.getUTCMonth() + 1) + "/" + mon.getUTCDate() + "–" +
           (sun.getUTCMonth() + 1) + "/" + sun.getUTCDate();
  }

  // Ensure every record has a `wkstart` (Monday ordinal). Embedded/aggregated
  // data already carries it; raw data (with a `date`) gets it derived.
  function normalizeWeeks(payload) {
    for (const r of payload.records) {
      if (typeof r.wkstart !== "number") {
        r.wkstart = r.date ? mondayOrdinal(r.date) : 0;
      }
    }
  }

  // ── Recency ────────────────────────────────────────────────────────────
  // "Months since last order" is a per-clinic property: how many whole months
  // back the clinic's most recent order is, measured from the latest month in
  // the data. 0 = ordered in the latest month, 1 = last ordered the month
  // before, and so on. Each record is tagged with its clinic's bucket so the
  // normal filter machinery can treat it like any other category.
  function recencyLabel(n) {
    if (n === 0) return "0 (ordered this month)";
    if (n === 1) return "1 Month";
    return n + " Months";
  }

  function tagRecency(payload) {
    const max = payload.max_period;
    const lastByClinic = new Map();
    for (const r of payload.records) {
      const cur = lastByClinic.get(r.clinic);
      if (cur === undefined || r.period > cur) lastByClinic.set(r.clinic, r.period);
    }
    const present = new Set();
    for (const r of payload.records) {
      const n = max - lastByClinic.get(r.clinic);
      r.recency = recencyLabel(n);
      present.add(n);
    }
    // Numeric-ascending label list, for building the filter options in order.
    return Array.from(present).sort((a, b) => a - b).map(recencyLabel);
  }

  // ── Month-over-month change ──────────────────────────────────────────────
  // Per-clinic change in total sales (all drugs) for the latest month vs the
  // prior month (e.g. May vs April). Each record is tagged with its clinic's
  // bucket so the normal filter machinery treats it like any other category.
  const MOM_ORDER = [
    "New this month", "Up 50%+", "Up 25–49%", "Up 1–24%",
    "Down 0–24%", "Down 25–49%", "Down 50%+",
    "Stopped this month", "No sales either month",
  ];

  function tagMomChange(payload) {
    const cur = payload.max_period;
    const prev = cur - 1;
    const curT = new Map(), prevT = new Map();
    for (const r of payload.records) {
      if (r.period === cur) curT.set(r.clinic, (curT.get(r.clinic) || 0) + r.subtotal);
      else if (r.period === prev) prevT.set(r.clinic, (prevT.get(r.clinic) || 0) + r.subtotal);
    }
    const labelFor = (clinic) => {
      const p = prevT.get(clinic) || 0;
      const q = curT.get(clinic) || 0;
      if (p === 0 && q === 0) return "No sales either month";
      if (p === 0) return "New this month";          // grew from nothing
      if (q === 0) return "Stopped this month";      // dropped to nothing
      const pr = Math.round((q - p) / p * 100);
      if (pr >= 50) return "Up 50%+";
      if (pr >= 25) return "Up 25–49%";
      if (pr >= 1) return "Up 1–24%";
      if (pr >= -24) return "Down 0–24%";            // includes flat (0%)
      if (pr >= -49) return "Down 25–49%";
      return "Down 50%+";
    };
    const present = new Set();
    for (const r of payload.records) {
      const lab = labelFor(r.clinic);
      r.mom = lab;
      present.add(lab);
    }
    // "No sales either month" (no orders in the current or prior month) is a
    // dormant catch-all that isn't useful as a month-over-month bucket, so it's
    // omitted from the filter options and chart. Those clinics still appear in
    // the table via the other dimensions.
    return MOM_ORDER.filter((l) => present.has(l) && l !== "No sales either month");
  }
})(typeof window !== "undefined" ? window : globalThis);

<script>
/* xlsx-lite.js — zero-dependency .xlsx reader for the Clinic Streak dashboard.
 *
 * Reads a Metabase export entirely in the browser with NO external library:
 *   1. Parse the ZIP central directory (an .xlsx is a ZIP of XML parts).
 *   2. Inflate the parts we need with the built-in DecompressionStream.
 *   3. Pull cells from the `Query result` worksheet + the shared-strings table.
 *   4. Map columns by header name and emit the same record shape as data.json.
 *
 * Works from a plain file:// double-click — no server, no CDN, no Python.
 * Requires a browser with DecompressionStream + async/await (all current
 * Chrome/Edge/Firefox/Safari). Exposes window.XlsxLite.read(arrayBuffer, name).
 */
(function (global) {
  "use strict";

  // Order rows are bucketed by calendar month (derived from order_date).
  var NEEDED = ["order_date", "drug_name", "clinic_name", "sales_rep", "subtotal", "status"];

  // ---- ZIP parsing -------------------------------------------------------
  // Minimal reader: find End-Of-Central-Directory, walk central directory,
  // then read each local file header to locate the compressed bytes.

  function u16(dv, o) { return dv.getUint16(o, true); }
  function u32(dv, o) { return dv.getUint32(o, true); }

  function findEOCD(dv) {
    // EOCD signature 0x06054b50, scan backwards (max comment 65535).
    var len = dv.byteLength;
    var min = Math.max(0, len - 65557);
    for (var i = len - 22; i >= min; i--) {
      if (u32(dv, i) === 0x06054b50) return i;
    }
    throw new Error("Not a valid .xlsx (no ZIP end record found).");
  }

  function listEntries(buf) {
    var dv = new DataView(buf);
    var eocd = findEOCD(dv);
    var count = u16(dv, eocd + 10);
    var cdOffset = u32(dv, eocd + 16);
    var entries = {};
    var p = cdOffset;
    for (var n = 0; n < count; n++) {
      if (u32(dv, p) !== 0x02014b50) break; // central dir header sig
      var method = u16(dv, p + 10);
      var compSize = u32(dv, p + 20);
      var nameLen = u16(dv, p + 28);
      var extraLen = u16(dv, p + 30);
      var commentLen = u16(dv, p + 32);
      var localHdr = u32(dv, p + 42);
      var name = utf8(new Uint8Array(buf, p + 46, nameLen));
      entries[name] = { method: method, compSize: compSize, localHdr: localHdr };
      p += 46 + nameLen + extraLen + commentLen;
    }
    return { buf: buf, entries: entries };
  }

  function rawBytes(zip, name) {
    var e = zip.entries[name];
    if (!e) return null;
    var dv = new DataView(zip.buf);
    // Local file header: name + extra lengths live at +26/+28.
    var lh = e.localHdr;
    if (u32(dv, lh) !== 0x04034b50) throw new Error("Bad local header for " + name);
    var nameLen = u16(dv, lh + 26);
    var extraLen = u16(dv, lh + 28);
    var start = lh + 30 + nameLen + extraLen;
    return { method: e.method, bytes: new Uint8Array(zip.buf, start, e.compSize) };
  }

  function utf8(bytes) {
    return new TextDecoder("utf-8").decode(bytes);
  }

  async function inflate(part) {
    if (part.method === 0) return part.bytes; // stored, no compression
    if (part.method !== 8) throw new Error("Unsupported ZIP method " + part.method);
    if (typeof DecompressionStream === "undefined") {
      throw new Error("Your browser lacks DecompressionStream; please use a current Chrome, Edge, Firefox, or Safari.");
    }
    var ds = new DecompressionStream("deflate-raw");
    var stream = new Response(part.bytes).body.pipeThrough(ds);
    var ab = await new Response(stream).arrayBuffer();
    return new Uint8Array(ab);
  }

  async function readText(zip, name) {
    var part = rawBytes(zip, name);
    if (!part) return null;
    return utf8(await inflate(part));
  }

  // ---- XML helpers -------------------------------------------------------

  function decodeEntities(s) {
    if (s.indexOf("&") === -1) return s;
    return s.replace(/&lt;/g, "<").replace(/&gt;/g, ">")
            .replace(/&quot;/g, '"').replace(/&apos;/g, "'")
            .replace(/&#(\d+);/g, function (_, d) { return String.fromCharCode(+d); })
            .replace(/&#x([0-9a-fA-F]+);/g, function (_, h) { return String.fromCharCode(parseInt(h, 16)); })
            .replace(/&amp;/g, "&");
  }

  // Shared strings: each <si> may hold <t>..</t> or multiple <r><t>..</t></r>.
  function parseSharedStrings(xml) {
    var out = [];
    if (!xml) return out;
    var siRe = /<si>([\s\S]*?)<\/si>/g, m;
    var tRe = /<t[^>]*>([\s\S]*?)<\/t>/g;
    while ((m = siRe.exec(xml))) {
      var inner = m[1], t, parts = "";
      while ((t = tRe.exec(inner))) parts += t[1];
      tRe.lastIndex = 0;
      out.push(decodeEntities(parts));
    }
    return out;
  }

  function colLetters(ref) {
    // "AB12" -> "AB"
    var i = 0;
    while (i < ref.length && ref.charCodeAt(i) >= 65) i++;
    return ref.slice(0, i);
  }
  function colToIndex(letters) {
    var n = 0;
    for (var i = 0; i < letters.length; i++) n = n * 26 + (letters.charCodeAt(i) - 64);
    return n - 1;
  }

  // Resolve a worksheet cell's value to string|number given its type + shared strings.
  function cellValue(cellXml, type, shared) {
    var vm = /<v>([\s\S]*?)<\/v>/.exec(cellXml);
    if (!vm) {
      var inl = /<t[^>]*>([\s\S]*?)<\/t>/.exec(cellXml); // inline string
      return inl ? decodeEntities(inl[1]) : null;
    }
    var raw = vm[1];
    if (type === "s") return shared[+raw];
    if (type === "str") return decodeEntities(raw);
    if (type === "b") return raw === "1";
    return parseFloat(raw); // number (incl. date serials), default
  }

  // ---- main --------------------------------------------------------------

  function pickWorksheet(zip) {
    // Map sheet name -> r:id (workbook.xml), r:id -> target (rels).
    var wbName = "xl/workbook.xml";
    // we already have these inflated by caller; handled in read()
    return null;
  }

  async function read(arrayBuffer, sourceName) {
    var zip = listEntries(arrayBuffer);

    var wbXml = await readText(zip, "xl/workbook.xml");
    var relsXml = await readText(zip, "xl/_rels/workbook.xml.rels");
    if (!wbXml || !relsXml) throw new Error("Missing workbook parts in .xlsx.");

    // sheet name -> rId
    var sheets = {};
    var sRe = /<sheet\b[^>]*\/?>/g, sm;
    while ((sm = sRe.exec(wbXml))) {
      var nm = /name="([^"]+)"/.exec(sm[0]);
      var rid = /r:id="([^"]+)"/.exec(sm[0]);
      if (nm && rid) sheets[decodeEntities(nm[1])] = rid[1];
    }
    // rId -> target path
    var rels = {};
    var rRe = /<Relationship\b[^>]*\/?>/g, rm;
    while ((rm = rRe.exec(relsXml))) {
      var id = /Id="([^"]+)"/.exec(rm[0]);
      var tg = /Target="([^"]+)"/.exec(rm[0]);
      if (id && tg) rels[id[1]] = tg[1];
    }

    var sheetName = sheets["Query result"] ? "Query result"
      : Object.keys(sheets)[Object.keys(sheets).length - 1];
    if (!sheetName) throw new Error("No worksheets found.");
    var target = rels[sheets[sheetName]];
    if (!target) throw new Error("Could not resolve sheet '" + sheetName + "'.");
    var sheetPath = "xl/" + target.replace(/^\//, "").replace(/^xl\//, "");

    var shared = parseSharedStrings(await readText(zip, "xl/sharedStrings.xml"));
    var sheetXml = await readText(zip, sheetPath);
    if (!sheetXml) throw new Error("Could not read worksheet data.");

    // Walk rows.
    var rowRe = /<row\b[^>]*>([\s\S]*?)<\/row>/g, rowM;
    var cellRe = /<c\b([^>]*)(?:\/>|>([\s\S]*?)<\/c>)/g;

    var colIndex = null; // header-name -> 0-based column index
    var records = [], minP = null, maxP = null;
    var firstRow = true;

    while ((rowM = rowRe.exec(sheetXml))) {
      var rowInner = rowM[1];
      var cells = {}; // colIdx -> value
      var cm;
      cellRe.lastIndex = 0;
      while ((cm = cellRe.exec(rowInner))) {
        var attrs = cm[1], body = cm[2] || "";
        var ref = /r="([A-Z]+\d+)"/.exec(attrs);
        if (!ref) continue;
        var ci = colToIndex(colLetters(ref[1]));
        var tt = /t="([^"]+)"/.exec(attrs);
        cells[ci] = cellValue(body, tt ? tt[1] : null, shared);
      }

      if (firstRow) {
        firstRow = false;
        colIndex = {};
        Object.keys(cells).forEach(function (ci) {
          var name = cells[ci];
          if (typeof name === "string") colIndex[name.trim()] = +ci;
        });
        var missing = NEEDED.filter(function (n) {
          return n !== "status" && !(n in colIndex);
        });
        if (missing.length) {
          throw new Error("Sheet '" + sheetName + "' is missing columns: " +
            missing.join(", ") + ". Make sure you exported the 'Query result' tab.");
        }
        continue;
      }

      var serial = cells[colIndex.order_date];
      if (typeof serial !== "number" || !isFinite(serial)) continue;
      var iso = serialToISO(serial);              // YYYY-MM-DD
      var y = +iso.slice(0, 4), mo = +iso.slice(5, 7);
      var period = y * 12 + (mo - 1);             // month ordinal
      var dd = +iso.slice(8, 10);
      var t = Date.UTC(y, mo - 1, dd);
      var dow = new Date(t).getUTCDay();          // 0=Sun … 6=Sat
      var wkstart = Math.floor(t / 86400000) - (dow === 0 ? 6 : dow - 1); // Monday ordinal

      var sub = cells[colIndex.subtotal];
      sub = (typeof sub === "number" && isFinite(sub)) ? sub :
            (sub == null || isNaN(parseFloat(sub)) ? 0 : parseFloat(sub));

      var statusCol = ("status" in colIndex) ? cells[colIndex.status] : "";

      records.push({
        rep: cells[colIndex.sales_rep] || "(no rep)",
        clinic: cells[colIndex.clinic_name] || "(no clinic)",
        drug: cells[colIndex.drug_name] || "(no drug)",
        period: period,
        wkstart: wkstart,
        subtotal: sub,
        status: statusCol || "",
        date: iso,
      });
      if (minP === null || period < minP) minP = period;
      if (maxP === null || period > maxP) maxP = period;
    }

    if (!records.length) throw new Error("No data rows with a valid order_date were found.");

    // Human-readable month labels for each period ordinal in range.
    var MON = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
               "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    var labels = {};
    for (var pp = minP; pp <= maxP; pp++) {
      labels[pp] = MON[pp % 12] + " " + Math.floor(pp / 12);
    }

    return {
      generated: new Date().toISOString(),
      source: sourceName || sheetName,
      sheet: sheetName,
      min_period: minP,
      max_period: maxP,
      period_labels: labels,
      records: records,
    };
  }

  function serialToISO(serial) {
    var ms = Date.UTC(1899, 11, 30) + Math.round(serial * 86400) * 1000;
    return new Date(ms).toISOString().slice(0, 10);
  }

  global.XlsxLite = { read: read };
})(typeof window !== "undefined" ? window : globalThis);

</script>
<script id="embedded-data" type="application/json"></script>
<script>
const DIMS = [
  { key: "reps",    field: "rep",    label: "Sales Rep" },
  { key: "clinics", field: "clinic", label: "Clinic Name" },
  { key: "drugs",   field: "drug",   label: "Drug Name" },
  { key: "recency", field: "recency", label: "# Mo Since Last Order",
    values: (data) => data.recencyValues || [] },
  { key: "mom", field: "mom", label: "MoM Sales Change",
    values: (data) => data.momValues || [] },
];

const state = {
  data: null,
  filters: { reps: new Set(), clinics: new Set(), drugs: new Set(), recency: new Set(), mom: new Set() },
  open: new Set(),        // node ids that are expanded
  expandedMonths: new Set(), // month periods expanded into weeks
  searches: { reps: "", clinics: "", drugs: "", recency: "", mom: "" },
};

const fmt = (n) => n ? Math.round(n).toLocaleString("en-US", { maximumFractionDigits: 0 }) : "";
const id = (...p) => p.join("¦");

function init() {
  // 1) Prefer data embedded in the page (a shared/saved copy).
  const el = document.getElementById("embedded-data");
  if (el && el.textContent.trim()) {
    try {
      const payload = JSON.parse(el.textContent);
      payload.source = payload.source || "embedded data";
      applyPayload(payload);
      setupDropZone();
      return;
    } catch (e) {
      const loading = document.getElementById("loading");
      if (loading) { loading.className = "empty";
        loading.textContent = "Embedded data could not be read: " + e.message; }
    }
  }
  // 2) No embedded data: try bundled JSON (dev), else wait for a dropped file.
  (async () => {
    let payload = null;
    try {
      let res = await fetch("../data/data.json");
      if (res.ok) payload = await res.json();
    } catch (e) { /* ignore */ }
    if (!payload) {
      try {
        const res = await fetch("data/data.json");
        if (res.ok) payload = await res.json();
      } catch (e2) { /* no bundled data — wait for a dropped file */ }
    }
    if (payload) {
      applyPayload(payload);
    } else {
      document.getElementById("meta").innerHTML =
        `no data yet —<br><b>drop an .xlsx</b> to begin`;
      const loading = document.getElementById("loading");
      loading.className = "empty";
      loading.textContent = "Drop a Metabase .xlsx export above to build the pivot.";
    }
    setupDropZone();
  })();
}

function applyPayload(payload) {
  // Drop records with no real clinic (e.g. Metabase's "No Clinic" / "(no
  // clinic)" placeholder for orders not tied to a clinic, or blank names) so
  // they never appear in the pivot, filters, charts, or any export.
  payload.records = payload.records.filter((r) => {
    const c = (r.clinic || "").replace(/[()]/g, "").trim().toLowerCase();
    return c && c !== "no clinic";
  });
  state.data = payload;
  // Ensure every record has a week bucket (derived from date for raw data).
  Pivot.normalizeWeeks(payload);
  // Tag each record with its clinic's "months since last order" bucket and
  // capture the ordered list of buckets present for the filter options.
  state.data.recencyValues = Pivot.tagRecency(payload);
  state.data.momValues = Pivot.tagMomChange(payload);
  // Reset transient view state for the new dataset.
  for (const d of DIMS) { state.filters[d.key].clear(); state.searches[d.key] = ""; }
  state.open.clear();
  state.expandedMonths.clear();

  document.getElementById("meta").innerHTML =
    `source <b>${escapeHtml(payload.source || "—")}</b><br>` +
    `<b>${payload.records.length.toLocaleString()}</b> order lines · ` +
    `months <b>${(payload.period_labels && payload.period_labels[payload.min_period]) || ""}–${(payload.period_labels && payload.period_labels[payload.max_period]) || ""}</b>`;
  buildControls();
  render();
}

function buildControls() {
  const host = document.getElementById("controls");
  host.innerHTML = "";
  for (const dim of DIMS) {
    const all = dim.values ? dim.values(state.data) : Pivot.unique(state.data.records, dim.field);
    const card = document.createElement("div");
    card.className = "filter";
    card.innerHTML = `
      <div class="lbl">
        <span class="name">${dim.label}</span>
        <span class="count" id="cnt-${dim.key}"></span>
      </div>
      <input class="search" placeholder="filter ${all.length} values…" data-dim="${dim.key}" />
      <div class="optbox" id="box-${dim.key}"></div>
      <div class="actions">
        <button data-act="all" data-dim="${dim.key}">select all</button>
        <button data-act="none" data-dim="${dim.key}">clear</button>
      </div>`;
    host.appendChild(card);
    renderOptions(dim, all);

    card.querySelector(".search").addEventListener("input", (e) => {
      state.searches[dim.key] = e.target.value.toLowerCase();
      renderOptions(dim, all);
    });
    card.querySelectorAll(".actions button").forEach((b) =>
      b.addEventListener("click", () => {
        const sel = state.filters[dim.key];
        if (b.dataset.act === "all") {
          all.filter(v => v.toLowerCase().includes(state.searches[dim.key]))
             .forEach(v => sel.add(v));
        } else { sel.clear(); }
        renderOptions(dim, all); render();
      })
    );
  }
}

function renderOptions(dim, all) {
  const box = document.getElementById("box-" + dim.key);
  const q = state.searches[dim.key];
  const sel = state.filters[dim.key];
  const vis = all.filter(v => v.toLowerCase().includes(q));
  box.innerHTML = "";
  for (const v of vis.slice(0, 400)) {
    const row = document.createElement("label");
    row.className = "opt";
    row.innerHTML = `<input type="checkbox" ${sel.has(v) ? "checked" : ""}/>
                     <span class="t" title="${escapeAttr(v)}">${escapeHtml(v)}</span>`;
    row.querySelector("input").addEventListener("change", (e) => {
      if (e.target.checked) sel.add(v); else sel.delete(v);
      document.getElementById("cnt-" + dim.key).textContent =
        sel.size ? sel.size + " selected" : "all";
      render();
    });
    box.appendChild(row);
  }
  document.getElementById("cnt-" + dim.key).textContent =
    sel.size ? sel.size + " selected" : "all";
}

function render() {
  if (!state.data) return;
  const filtered = Pivot.applyFilters(state.data.records, state.filters);
  const pivot = Pivot.buildPivot(filtered, {
    min: state.data.min_period, max: state.data.max_period,
  });

  const table = document.getElementById("table");
  const loading = document.getElementById("loading");
  loading.hidden = true;
  table.hidden = false;

  document.getElementById("summary").innerHTML =
    `<b>${filtered.length.toLocaleString()}</b> lines · ` +
    `<b>${pivot.reps.length}</b> reps · grand total <b>$${fmt(pivot.grandTotal)}</b>`;

  renderCharts(filtered);

  if (!pivot.reps.length) {
    table.innerHTML = "";
    loading.hidden = false;
    loading.className = "empty";
    loading.textContent = "No rows match the current filters.";
    table.hidden = true;
    return;
  }

  const labels = state.data.period_labels || {};

  // Build the ordered list of visible columns. Each month is one column; an
  // expanded month is followed by a column for each week that has data.
  const colDesc = [];
  for (let i = 0; i < pivot.nCols; i++) {
    const p = pivot.min + i;
    const weeks = pivot.weeksPresent[i] || [];
    const expanded = state.expandedMonths.has(p);
    colDesc.push({ kind: "month", i, p, expanded, hasWeeks: weeks.length > 0 });
    if (expanded) for (const wk of weeks) colDesc.push({ kind: "week", i, p, wk });
  }

  let html = "<thead><tr>";
  html += `<th class="rowhead">Rep / Clinic / Drug</th>`;
  for (const d of colDesc) {
    if (d.kind === "month") {
      const tw = d.hasWeeks ? `<span class="cwirl ${d.expanded ? "" : "closed"}">▾</span>` : "";
      const cls = "mcol" + (d.expanded ? " exp" : "") + (d.hasWeeks ? " clk" : "");
      const attr = d.hasWeeks ? ` data-month="${d.p}" title="Click to ${d.expanded ? "collapse" : "expand into weeks"}"` : "";
      html += `<th class="${cls}"${attr}>${tw}${labels[d.p] || d.p}</th>`;
    } else {
      html += `<th class="wk">${weekLabel(d.wk)}</th>`;
    }
  }
  html += `<th class="gt">Grand&nbsp;Total</th></tr></thead><tbody>`;

  for (const rep of pivot.reps) {
    const repId = id(rep.name);
    const repOpen = state.open.has(repId);
    html += rowHtml("rep", rep, repId, true, repOpen, colDesc);
    if (repOpen) {
      for (const clinic of rep.clinics) {
        const clId = id(rep.name, clinic.name);
        const clOpen = state.open.has(clId);
        html += rowHtml("clinic", clinic, clId, true, clOpen, colDesc);
        if (clOpen) {
          for (const drug of clinic.drugs) {
            html += rowHtml("drug", drug, id(clId, drug.name), false, false, colDesc);
          }
        }
      }
    }
  }

  // Grand total row
  html += `<tr class="grand-row"><td class="rowhead"><span class="twirl leaf">•</span><span class="rowname">Grand Total</span></td>`;
  for (const d of colDesc) {
    const v = d.kind === "month"
      ? pivot.grandCols[d.i]
      : (pivot.grandWcols[d.i] ? (pivot.grandWcols[d.i][d.wk] || 0) : 0);
    html += cell(v, true, d.kind === "week");
  }
  html += `<td class="gt">$${fmt(pivot.grandTotal)}</td></tr>`;
  html += "</tbody>";
  table.innerHTML = html;

  table.querySelectorAll(".twirl[data-node]").forEach((el) =>
    el.addEventListener("click", () => {
      const nid = el.getAttribute("data-node");
      if (state.open.has(nid)) state.open.delete(nid); else state.open.add(nid);
      render();
    })
  );
  table.querySelectorAll(".mcol[data-month]").forEach((el) =>
    el.addEventListener("click", () => {
      const p = +el.getAttribute("data-month");
      if (state.expandedMonths.has(p)) state.expandedMonths.delete(p);
      else state.expandedMonths.add(p);
      render();
    })
  );
}

// ── Pie/donut charts per filter dimension ───────────────────────────────
// Each chart shows the share of total subtotal ($) by category, for the
// currently filtered records. High-cardinality dims (clinics, drugs) show the
// top slices with the remainder grouped as "Other"; reps and recency buckets
// show every category. Recency is ordered by bucket; others by size.
const PIE_COLORS = ["#b4451f", "#355e3b", "#8a7a55", "#5a4a2f", "#c98a1f",
                    "#4a6670", "#7a4a52", "#6f7a55", "#2a2620"];
const PIE_OTHER = "#c4bca8";
const PIE_TOP_N = 9;
const PIE_NOUN = { reps: "sales reps", clinics: "clinics", drugs: "drugs", recency: "buckets", mom: "ranges" };

function chartSlices(dim, records) {
  const m = new Map();
  for (const r of records) m.set(r[dim.field], (m.get(r[dim.field]) || 0) + r.subtotal);
  let items = [];
  for (const [label, value] of m) if (value > 0) items.push({ label, value });
  const order = dim.values ? dim.values(state.data) : null;
  // For dims with an explicit value list (recency, MoM), keep only listed
  // categories — this drops omitted buckets like "No sales either month".
  if (order) items = items.filter((it) => order.includes(it.label));
  const nCats = items.length;
  let truncated = false;
  if (order) {
    items.sort((a, b) => order.indexOf(a.label) - order.indexOf(b.label));
  } else {
    items.sort((a, b) => b.value - a.value);
    if (items.length > PIE_TOP_N + 1) {
      const rest = items.slice(PIE_TOP_N).reduce((s, x) => s + x.value, 0);
      items = items.slice(0, PIE_TOP_N);
      items.push({ label: "Other (" + (nCats - PIE_TOP_N) + ")", value: rest, other: true });
      truncated = true;
    }
  }
  items.forEach((it, i) => { it.color = it.other ? PIE_OTHER : PIE_COLORS[i % PIE_COLORS.length]; });
  return { items, nCats, truncated };
}

function donutSvg(items, total) {
  const R = 46, r = 27, cx = 50, cy = 50;
  if (!total || !items.length) return `<svg class="pie" viewBox="0 0 100 100"></svg>`;
  let paths = "";
  if (items.length === 1) {
    paths = `<circle cx="${cx}" cy="${cy}" r="${(R + r) / 2}" fill="none" ` +
            `stroke="${items[0].color}" stroke-width="${R - r}"/>`;
  } else {
    let a0 = -Math.PI / 2;
    for (const it of items) {
      const a1 = a0 + (it.value / total) * Math.PI * 2;
      const large = (a1 - a0) > Math.PI ? 1 : 0;
      const xo0 = (cx + R * Math.cos(a0)).toFixed(2), yo0 = (cy + R * Math.sin(a0)).toFixed(2);
      const xo1 = (cx + R * Math.cos(a1)).toFixed(2), yo1 = (cy + R * Math.sin(a1)).toFixed(2);
      const xi1 = (cx + r * Math.cos(a1)).toFixed(2), yi1 = (cy + r * Math.sin(a1)).toFixed(2);
      const xi0 = (cx + r * Math.cos(a0)).toFixed(2), yi0 = (cy + r * Math.sin(a0)).toFixed(2);
      paths += `<path d="M ${xo0} ${yo0} A ${R} ${R} 0 ${large} 1 ${xo1} ${yo1} ` +
               `L ${xi1} ${yi1} A ${r} ${r} 0 ${large} 0 ${xi0} ${yi0} Z" ` +
               `fill="${it.color}" style="stroke:var(--panel);stroke-width:0.8"/>`;
      a0 = a1;
    }
  }
  return `<svg class="pie" viewBox="0 0 100 100">${paths}</svg>`;
}

function renderCharts(records) {
  const host = document.getElementById("charts");
  if (!host) return;
  host.innerHTML = "";
  for (const dim of DIMS) {
    const { items, nCats, truncated } = chartSlices(dim, records);
    const total = items.reduce((s, x) => s + x.value, 0);
    const noun = PIE_NOUN[dim.key] || "values";
    const cap = truncated ? (nCats + " " + noun + " · top " + PIE_TOP_N + " shown")
                          : (nCats + " " + noun);
    let legend = "";
    for (const it of items) {
      const pct = total ? (it.value / total * 100) : 0;
      const pctTxt = pct >= 0.5 ? Math.round(pct) + "%" : "&lt;1%";
      legend += `<div class="lg">` +
        `<span class="sw" style="background:${it.color}"></span>` +
        `<span class="lb" title="${escapeAttr(it.label)}">${escapeHtml(it.label)}</span>` +
        `<span class="vl">${pctTxt}</span></div>`;
    }
    const card = document.createElement("div");
    card.className = "chart-card";
    card.innerHTML = `<div class="ttl">${escapeHtml(dim.label)}</div>` +
      `<div class="cap">${cap}</div>` +
      donutSvg(items, total) +
      `<div class="legend">${legend}</div>`;
    host.appendChild(card);
  }
}

function weekLabel(wkstart) {
  return Pivot.weekRangeLabel(wkstart);
}

function rowHtml(kind, node, nodeId, hasChildren, open, colDesc) {
  const twirl = hasChildren
    ? `<span class="twirl ${open ? "" : "closed"}" data-node="${escapeAttr(nodeId)}">▾</span>`
    : `<span class="twirl leaf">·</span>`;
  let cells = "";
  for (const d of colDesc) {
    const v = d.kind === "month"
      ? node.cols[d.i]
      : (node.wcols[d.i] ? (node.wcols[d.i][d.wk] || 0) : 0);
    cells += cell(v, false, d.kind === "week");
  }
  return `<tr class="r-${kind}">
    <td class="rowhead">${twirl}<span class="rowname" title="${escapeAttr(node.name)}">${escapeHtml(node.name)}</span></td>
    ${cells}
    <td class="gt">$${fmt(node.total)}</td></tr>`;
}

function cell(v, grand, isWeek) {
  if (!v) return `<td class="${isWeek ? "wk" : ""}"><span class="z">·</span></td>`;
  const cls = (grand ? "" : "pos") + (isWeek ? " wk" : "");
  return `<td class="${cls.trim()}">${fmt(v)}</td>`;
}

function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,"&quot;");}

function setupDropZone() {
  const drop = document.getElementById("drop");
  const input = document.getElementById("fileInput");
  const head = document.getElementById("dropHead");
  const sub = document.getElementById("dropSub");

  const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
  ["dragenter", "dragover"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { stop(e); drop.classList.add("dragover"); })
  );
  ["dragleave", "drop"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { stop(e); drop.classList.remove("dragover"); })
  );
  drop.addEventListener("drop", (e) => {
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) handleFile(f);
  });
  input.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) handleFile(f);
  });

  function handleFile(file) {
    drop.classList.remove("ok", "err");
    head.textContent = "Reading " + file.name + " …";
    sub.textContent = "Unzipping and parsing in your browser…";
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const payload = await XlsxLite.read(ev.target.result, file.name);
        applyPayload(payload);
        drop.classList.add("ok");
        head.textContent = "Loaded " + file.name;
        sub.textContent = payload.records.length.toLocaleString() +
          " order lines · " +
          ((payload.period_labels && payload.period_labels[payload.min_period]) || "") + "–" +
          ((payload.period_labels && payload.period_labels[payload.max_period]) || "") +
          " · sheet '" + payload.sheet + "'. Drop another to replace.";
      } catch (err) {
        drop.classList.add("err");
        head.textContent = "Could not read that file";
        sub.textContent = (err && err.message) ? err.message : String(err);
      }
    };
    reader.onerror = () => {
      drop.classList.add("err");
      head.textContent = "Could not read that file";
      sub.textContent = "The browser failed to read the file.";
    };
    reader.readAsArrayBuffer(file);
  }
}

// Collapse records to one row per rep/clinic/drug/month/week, dropping any
// derived fields (e.g. recency). Keeps the saved copy small and free of raw
// line items while preserving Monday-week detail so months can still expand.
function aggregatePayload(p) {
  const map = new Map();
  const key = (r) => r.rep + "\u0001" + r.clinic + "\u0001" + r.drug;
  for (const r of p.records) {
    const k = key(r);
    let m = map.get(k);
    if (!m) { m = { rep: r.rep, clinic: r.clinic, drug: r.drug, p: {} }; map.set(k, m); }
    const ik = r.period + ":" + (r.wkstart | 0);
    m.p[ik] = (m.p[ik] || 0) + r.subtotal;
  }
  const records = [];
  for (const m of map.values())
    for (const ik in m.p) {
      const sp = ik.split(":");
      records.push({ rep: m.rep, clinic: m.clinic, drug: m.drug,
                     period: +sp[0], wkstart: +sp[1],
                     subtotal: Math.round(m.p[ik] * 100) / 100 });
    }
  return { generated: p.generated, source: p.source,
           min_period: p.min_period, max_period: p.max_period,
           period_labels: p.period_labels, records };
}

// Export the current (filtered) pivot as CSV. level "drug" gives one row per
// Rep/Clinic/Drug; level "clinic" sums across drugs for one row per Rep/Clinic.
// Columns: a month each + Grand Total, plus a Grand Total row. Values match the
// on-screen figures (whole dollars). Opens directly in Excel.
function exportCsv(level) {
  if (!state.data) { alert("No data is loaded yet."); return; }
  const byClinic = level === "clinic";
  const filtered = Pivot.applyFilters(state.data.records, state.filters);
  const pivot = Pivot.buildPivot(filtered, {
    min: state.data.min_period, max: state.data.max_period,
  });
  const labels = state.data.period_labels || {};
  const months = [];
  for (let p = pivot.min; p <= pivot.max; p++) months.push(p);

  const esc = (s) => {
    s = String(s);
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const num = (v) => (v ? Math.round(v) : "");

  const lines = [];
  const head = byClinic ? ["Sales Rep", "Clinic"] : ["Sales Rep", "Clinic", "Drug"];
  lines.push([...head, ...months.map((p) => labels[p] || p), "Grand Total"].map(esc).join(","));

  for (const rep of pivot.reps) {
    for (const clinic of rep.clinics) {
      if (byClinic) {
        const cells = [rep.name, clinic.name];
        for (let i = 0; i < pivot.nCols; i++) cells.push(num(clinic.cols[i]));
        cells.push(num(clinic.total));
        lines.push(cells.map(esc).join(","));
      } else {
        for (const drug of clinic.drugs) {
          const cells = [rep.name, clinic.name, drug.name];
          for (let i = 0; i < pivot.nCols; i++) cells.push(num(drug.cols[i]));
          cells.push(num(drug.total));
          lines.push(cells.map(esc).join(","));
        }
      }
    }
  }

  const gt = byClinic ? ["Grand Total", ""] : ["Grand Total", "", ""];
  for (let i = 0; i < pivot.nCols; i++) gt.push(num(pivot.grandCols[i]));
  gt.push(num(pivot.grandTotal));
  lines.push(gt.map(esc).join(","));

  // BOM so Excel reads UTF-8 (accented names) correctly; CRLF line endings.
  const csv = "\uFEFF" + lines.join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = byClinic ? "clinic-streak-by-clinic.csv" : "clinic-streak-by-drug.csv";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── Minimal XLSX writer (no dependencies) ────────────────────────────────
// Builds a real .xlsx with one formatted Excel Table per sheet
// (TableStyleMedium2 — blue banded rows), the accounting comma number format,
// a bold Grand Total column, and a frozen header. Output is a stored ZIP.
const XLSX_CRC = (function () {
  let c, t = [];
  for (let n = 0; n < 256; n++) { c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }
  return t;
})();
function xlsxCrc32(b) { let c = 0xFFFFFFFF; for (let i = 0; i < b.length; i++) c = XLSX_CRC[(c ^ b[i]) & 0xFF] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0; }
function xlsxEnc(s) { return new TextEncoder().encode(s); }
function xlsxEscape(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function xlsxColL(n) { let s = ""; n++; while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = (n - m - 1) / 26 | 0; } return s; }
function xlsxZip(files) {
  const u16 = (v) => [v & 255, (v >> 8) & 255];
  const u32 = (v) => [v & 255, (v >> 8) & 255, (v >> 16) & 255, (v >> 24) & 255];
  const parts = [], central = []; let off = 0;
  for (const f of files) {
    const nb = xlsxEnc(f.name), d = f.data, crc = xlsxCrc32(d);
    const lh = [0x50, 0x4b, 0x03, 0x04, ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(d.length), ...u32(d.length), ...u16(nb.length), ...u16(0)];
    parts.push(new Uint8Array(lh), nb, d);
    const ch = [0x50, 0x4b, 0x01, 0x02, ...u16(20), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(d.length), ...u32(d.length), ...u16(nb.length), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(0), ...u32(off)];
    central.push(new Uint8Array(ch), nb);
    off += lh.length + nb.length + d.length;
  }
  let cdSize = 0; for (const c of central) cdSize += c.length;
  const eocd = [0x50, 0x4b, 0x05, 0x06, ...u16(0), ...u16(0), ...u16(files.length), ...u16(files.length), ...u32(cdSize), ...u32(off), ...u16(0)];
  const all = [...parts, ...central, new Uint8Array(eocd)];
  let tot = 0; for (const a of all) tot += a.length;
  const out = new Uint8Array(tot); let p = 0; for (const a of all) { out.set(a, p); p += a.length; }
  return out;
}
const XLSX_STYLES = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<numFmts count="1"><numFmt numFmtId="164" formatCode="_(* #,##0_);_(* \\(#,##0\\);_(* &quot;-&quot;??_);_(@_)"/></numFmts>
<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts>
<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>
<borders count="1"><border/></borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="3"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="164" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/><xf numFmtId="164" fontId="1" fillId="0" borderId="0" xfId="0" applyNumberFormat="1" applyFont="1"/></cellXfs>
<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`;
function xlsxSheetXml(sheet) {
  const H = sheet.headers, ncol = H.length;
  const textCols = sheet.textCols || 2;
  const widths = sheet.widths || (function () { const w = [22, 46]; for (let i = 2; i < ncol - 1; i++) w.push(10); w.push(13); return w; })();
  let cols = "<cols>"; widths.forEach((w, i) => cols += `<col min="${i + 1}" max="${i + 1}" width="${w}" customWidth="1"/>`); cols += "</cols>";
  let rows = `<row r="1">`;
  H.forEach((h, i) => rows += `<c r="${xlsxColL(i)}1" t="inlineStr" s="0"><is><t xml:space="preserve">${xlsxEscape(h)}</t></is></c>`);
  rows += "</row>";
  sheet.rows.forEach((rec, ri) => {
    const r = ri + 2; rows += `<row r="${r}">`;
    rec.forEach((val, ci) => {
      const ref = xlsxColL(ci) + r;
      if (ci < textCols) { if (val != null && val !== "") rows += `<c r="${ref}" t="inlineStr" s="0"><is><t xml:space="preserve">${xlsxEscape(val)}</t></is></c>`; }
      else { const isGrand = (ci === ncol - 1); if (val) rows += `<c r="${ref}" s="${isGrand ? 2 : 1}"><v>${val}</v></c>`; }
    });
    rows += "</row>";
  });
  const tp = sheet.rows.length >= 1 ? `<tableParts count="1"><tablePart r:id="rId1"/></tableParts>` : "";
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/><selection pane="bottomLeft" activeCell="A2" sqref="A2"/></sheetView></sheetViews>
<sheetFormatPr defaultRowHeight="15"/>${cols}<sheetData>${rows}</sheetData>${tp}</worksheet>`;
}
function xlsxTableXml(id, name, sheet) {
  const H = sheet.headers, ncol = H.length, last = xlsxColL(ncol - 1), ref = `A1:${last}${1 + sheet.rows.length}`;
  let cols = `<tableColumns count="${ncol}">`;
  H.forEach((h, i) => cols += `<tableColumn id="${i + 1}" name="${xlsxEscape(h)}"/>`); cols += "</tableColumns>";
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<table xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" id="${id}" name="${name}" displayName="${name}" ref="${ref}" totalsRowShown="0"><autoFilter ref="${ref}"/>${cols}<tableStyleInfo name="TableStyleMedium2" showFirstColumn="0" showLastColumn="0" showRowStripes="1" showColumnStripes="0"/></table>`;
}
function xlsxBuild(sheets) {
  const files = [];
  const ct = [`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`,
    `<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">`,
    `<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>`,
    `<Default Extension="xml" ContentType="application/xml"/>`,
    `<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>`,
    `<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>`];
  sheets.forEach((s, i) => ct.push(`<Override PartName="/xl/worksheets/sheet${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`));
  sheets.forEach((s, i) => { if (s.rows.length >= 1) ct.push(`<Override PartName="/xl/tables/table${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.table+xml"/>`); });
  ct.push(`</Types>`);
  files.push({ name: "[Content_Types].xml", data: xlsxEnc(ct.join("")) });
  files.push({ name: "_rels/.rels", data: xlsxEnc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`) });
  let wb = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>`;
  sheets.forEach((s, i) => wb += `<sheet name="${xlsxEscape(s.name)}" sheetId="${i + 1}" r:id="rId${i + 1}"/>`);
  wb += `</sheets></workbook>`;
  files.push({ name: "xl/workbook.xml", data: xlsxEnc(wb) });
  let wr = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">`;
  sheets.forEach((s, i) => wr += `<Relationship Id="rId${i + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i + 1}.xml"/>`);
  wr += `<Relationship Id="rId${sheets.length + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`;
  files.push({ name: "xl/_rels/workbook.xml.rels", data: xlsxEnc(wr) });
  files.push({ name: "xl/styles.xml", data: xlsxEnc(XLSX_STYLES) });
  sheets.forEach((s, i) => {
    files.push({ name: `xl/worksheets/sheet${i + 1}.xml`, data: xlsxEnc(xlsxSheetXml(s)) });
    if (s.rows.length >= 1) {
      files.push({ name: `xl/worksheets/_rels/sheet${i + 1}.xml.rels`, data: xlsxEnc(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/table" Target="../tables/table${i + 1}.xml"/></Relationships>`) });
      files.push({ name: `xl/tables/table${i + 1}.xml`, data: xlsxEnc(xlsxTableXml(i + 1, "Tbl" + (i + 1), s)) });
    }
  });
  return xlsxZip(files);
}

const MONTH_ABBR = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
function monthShort(p) { return MONTH_ABBR[p % 12] + "-" + String(Math.floor(p / 12) % 100).padStart(2, "0"); }

// Build a single-sheet Excel export: one row per clinic with a "MoM Category"
// column (the seven month-over-month buckets for clinics that ordered this
// month, plus 1 Mo / 2 Mo / 3+ Mo for clinics inactive that long). Respects
// rep/clinic/drug filters but not the MoM/recency filters (the column shows
// every category). Formatted as one Excel Table; one row per clinic.
const MOM_CAT_ORDER = ["New", "Up 50%+", "Up 25–49%", "Up 1–24%", "Down 0–24%", "Down 25–49%", "Down 50%+", "1 Mo", "2+ Mo"];
const MOM_TO_CAT = {
  "New this month": "New", "Up 50%+": "Up 50%+", "Up 25–49%": "Up 25–49%", "Up 1–24%": "Up 1–24%",
  "Down 0–24%": "Down 0–24%", "Down 25–49%": "Down 25–49%", "Down 50%+": "Down 50%+",
};
function clinicCategory(mom, recency) {
  if (recency === "0 (ordered this month)") return MOM_TO_CAT[mom] || mom;
  if (recency === "1 Month") return "1 Mo";
  return "2+ Mo"; // last ordered more than a month ago
}

function exportWorkbook() {
  if (!state.data) { alert("No data is loaded yet."); return; }
  const base = Pivot.applyFilters(state.data.records, {
    reps: state.filters.reps, clinics: state.filters.clinics, drugs: state.filters.drugs,
  });
  const min = state.data.min_period, max = state.data.max_period;
  const months = []; for (let p = min; p <= max; p++) months.push(p);

  // Category per clinic (mom/recency are tagged per clinic, identical across its records).
  const catByClinic = new Map();
  for (const r of base) {
    const k = r.rep + "\u0001" + r.clinic;
    if (!catByClinic.has(k)) catByClinic.set(k, clinicCategory(r.mom, r.recency));
  }

  const pv = Pivot.buildPivot(base, { min, max });
  const data = [];
  for (const rep of pv.reps) for (const c of rep.clinics) {
    const cat = catByClinic.get(rep.name + "\u0001" + c.name) || "2+ Mo";
    const monthVals = []; let g = 0;
    for (let i = 0; i < pv.nCols; i++) { const v = Math.round(c.cols[i]); g += v; monthVals.push(v || ""); }
    data.push({ rep: rep.name, clinic: c.name, cat, monthVals, g });
  }
  // Group by category (canonical order), then by sales descending within each.
  data.sort((a, b) => (MOM_CAT_ORDER.indexOf(a.cat) - MOM_CAT_ORDER.indexOf(b.cat)) || (b.g - a.g));

  const headers = ["Sales Rep", "Clinic", "MoM Category", ...months.map(monthShort), "Grand Total"];
  const widths = [20, 38, 15, ...months.map(() => 9.5), 13];
  const rows = data.map((r) => [r.rep, r.clinic, r.cat, ...r.monthVals, r.g]);
  const sheet = { name: "MoM by Clinic", headers, rows, textCols: 3, widths };

  const bytes = xlsxBuild([sheet]);
  const blob = new Blob([bytes], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "clinic-streak-MoM-by-clinic.xlsx";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// Rebuild this page as a self-contained file with the current data embedded,
// then download it. Recipients open it prepopulated — no install, no internet.
function downloadCopy() {
  if (!state.data) { alert("No data is loaded yet. Drop a Metabase .xlsx first."); return; }
  let json = JSON.stringify(aggregatePayload(state.data));
  // Every "<" here is inside a string value; escaping it keeps the JSON valid
  // and makes it impossible to accidentally end the embedded data block early.
  json = json.replace(/</g, "\\u003c");

  const doc = document.documentElement.cloneNode(true);
  const el = doc.querySelector("#embedded-data");
  el.textContent = json;
  // Clear transient view state; init() rebuilds it from the embedded data.
  const c = doc.querySelector("#controls"); if (c) c.innerHTML = "";
  const t = doc.querySelector("#table"); if (t) { t.innerHTML = ""; t.setAttribute("hidden", ""); }
  const l = doc.querySelector("#loading"); if (l) { l.className = "loading"; l.textContent = "Loading data…"; }

  const html = "<!doctype html>\n" + doc.outerHTML;
  const blob = new Blob([html], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "clinic-streak-shared.html";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function _recFromRow(r){
  const iso=String(r.order_date).slice(0,10);
  const y=+iso.slice(0,4), mo=+iso.slice(5,7), dd=+iso.slice(8,10);
  const period=y*12+(mo-1);
  const t=Date.UTC(y,mo-1,dd), dow=new Date(t).getUTCDay();
  const wkstart=Math.floor(t/86400000)-(dow===0?6:dow-1);
  let sub=r.subtotal; sub=(typeof sub==="number"&&isFinite(sub))?sub:(sub==null||isNaN(parseFloat(sub))?0:parseFloat(sub));
  return { rep:r.sales_rep||"(no rep)", clinic:r.clinic_name||"(no clinic)", drug:r.drug_name||"(no drug)",
           period, wkstart, subtotal:sub, status:r.status||"", date:iso };
}
function _payloadFromRows(rows){
  const records=[]; let minP=null,maxP=null;
  for(const r of rows){ if(r.order_date==null) continue; const rec=_recFromRow(r); records.push(rec);
    if(minP===null||rec.period<minP)minP=rec.period; if(maxP===null||rec.period>maxP)maxP=rec.period; }
  const labels={}; if(minP!==null) for(let p=minP;p<=maxP;p++) labels[p]=_MON[((p%12)+12)%12]+" "+Math.floor(p/12);
  return { generated:new Date().toISOString(), source:"Supabase", sheet:"orders", min_period:minP, max_period:maxP, period_labels:labels, records };
}
async function _fetchAllOrders(){
  const cols="order_date,sales_rep,clinic_name,drug_name,subtotal";
  const size=1000; let from=0; const all=[];
  for(;;){
    const { data, error } = await sb.from("orders").select(cols).range(from, from+size-1);
    if(error) throw error;
    all.push(...data);
    if(data.length<size) break;
    from+=size;
  }
  return all;
}
async function _loadFromSupabase(){
  try{
    const payload=_payloadFromRows(await _fetchAllOrders());
    if(!payload.records.length){
      document.getElementById("meta").innerHTML="no data visible to this account";
      const l=document.getElementById("loading"); if(l){ l.className="empty"; l.textContent="No data is visible to this account."; }
